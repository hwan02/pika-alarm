name: daily-summary

on:
  schedule:
    - cron: "0 1 * * *"   # 매일 10시 KST (01:00 UTC)
    - cron: "0 13 * * *"  # 매일 22시 KST (13:00 UTC)
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Restore stats cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/pika_stats.json
          key: stats-dummy
          restore-keys: stats-

      - run: python main.py --summary
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Reset stats for next day
        uses: actions/cache/save@v4
        with:
          path: /tmp/pika_stats.json
          key: stats-reset-${{ github.run_id }}
